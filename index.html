<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Барабанное Казино МГЕ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
            user-select: none;
        }
        h1 { color: #ffd700; font-size: 22px; margin-bottom: 15px; text-shadow: 0 0 8px rgba(255, 215, 0, 0.4); text-transform: uppercase; }
        .game-container { background: #222; padding: 20px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.6); border: 2px solid #333; width: 100%; max-width: 340px; display: flex; flex-direction: column; align-items: center; }
        .roulette-wrapper { position: relative; width: 260px; height: 260px; margin-bottom: 20px; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; background: #111; border: 10px solid #5c4033; position: relative; transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .wheel::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 35px; height: 35px; background: radial-gradient(circle, #fff, #ffd700, #b8860b); border-radius: 50%; z-index: 10; }
        .ball { position: absolute; width: 14px; height: 14px; background: radial-gradient(circle, #fff 60%, #ccc 100%); border-radius: 50%; top: 20px; left: calc(50% - 7px); z-index: 5; transform-origin: 7px 100px; transition: transform 4s cubic-bezier(0.1, 0.8, 0.2, 1); }
        .pointer { position: absolute; top: -12px; left: calc(50% - 12px); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid #ffd700; z-index: 20; }
        .controls { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .balance-info { font-size: 15px; text-align: center; color: #aaa; }
        #balance { color: #2ecc71; font-weight: bold; }
        .inputs-row { display: flex; gap: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        label { font-size: 12px; color: #888; }
        input { 
            padding: 8px; 
            background: #111; 
            border: 1px solid #444; 
            color: #fff; 
            border-radius: 6px; 
            font-size: 14px; 
            text-align: center; 
            -moz-appearance: textfield; 
            /* ИСПРАВЛЕНИЕ: Разрешаем выделение и фокус для полей ввода */
            user-select: text; 
            -webkit-user-select: text;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .bet-sections { display: flex; gap: 8px; }
        .bet-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-red { background: #e74c3c; color: #fff; }
        .btn-black { background: #34495e; color: #fff; }
        .btn-red.selected { border: 2px solid #fff; box-shadow: 0 0 10px #e74c3c; }
        .btn-black.selected { border: 2px solid #fff; box-shadow: 0 0 10px #34495e; }
        .spin-btn { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #000; font-size: 16px; font-weight: bold; padding: 12px; border: none; border-radius: 6px; cursor: pointer; margin-top: 5px; }
        .spin-btn:disabled { background: #444; color: #777; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>🎰 МГЕ РУЛЕТКА 🎰</h1>

    <div class="game-container">
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <canvas id="wheel-canvas" class="wheel" width="240" height="240"></canvas>
            <div id="ball" class="ball"></div>
        </div>

        <div class="controls">
            <div class="balance-info">Ваши фишки: <span id="balance">Загрузка...</span> 👊</div>
            
            <div class="inputs-row">
                <div class="input-group">
                    <label>Ставка (👊):</label>
                    <input type="number" id="bet-amount" value="50" min="1" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>Число (0-36):</label>
                    <input type="number" id="bet-number" min="0" max="36" inputmode="numeric">
                </div>
            </div>

            <div class="bet-sections">
                <button class="bet-btn btn-red" id="btn-red" onclick="selectColor('red')">Красное</button>
                <button class="bet-btn btn-black" id="btn-black" onclick="selectColor('black')">Черное</button>
            </div>

            <button class="spin-btn" id="spin-button" onclick="spinWheel()">ИГРАТЬ</button>
        </div>
    </div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        let playerBalance = parseInt(getUrlParam('balance')) || 0;
        document.getElementById('balance').innerText = playerBalance;

        const rouletteNumbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const totalSectors = rouletteNumbers.length;

        function getNumberColor(num) {
            if (num === 0) return '#2ecc71';
            const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
            return redNumbers.includes(num) ? '#e74c3c' : '#2c3e50';
        }

        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const radius = canvas.width / 2;

        function drawWheel() {
            const anglePerSector = (2 * Math.PI) / totalSectors;
            for (let i = 0; i < totalSectors; i++) {
                const currentAngle = i * anglePerSector;
                ctx.beginPath();
                ctx.fillStyle = getNumberColor(rouletteNumbers[i]);
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius - 8, currentAngle, currentAngle + anglePerSector);
                ctx.lineTo(radius, radius);
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(currentAngle + anglePerSector / 2 + Math.PI / 2);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(rouletteNumbers[i], 0, -radius + 20);
                ctx.restore();
            }
        }
        drawWheel();

        // ИСПРАВЛЕНИЕ: Логика взаимоисключающих ставок
        let selectedColor = null;
        let isSpinning = false;
        let currentWheelRotation = 0; 
        let currentBallRotation = 0;

        function selectColor(color) {
            if (isSpinning) return;
            selectedColor = color;
            
            // Сбрасываем число, если выбрали цвет
            document.getElementById('bet-number').value = '';
            
            document.getElementById('btn-red').classList.remove('selected');
            document.getElementById('btn-black').classList.remove('selected');
            if (color) document.getElementById(`btn-${color}`).classList.add('selected');
        }

        document.getElementById('bet-number').addEventListener('input', (e) => {
            let val = e.target.value;
            
            if (val !== "") {
                // Сбрасываем цвет, если вводим число
                selectedColor = null;
                document.getElementById('btn-red').classList.remove('selected');
                document.getElementById('btn-black').classList.remove('selected');

                let num = parseInt(val);
                if (num < 0) e.target.value = 0;
                if (num > 36) e.target.value = 36;
            }
        });

        function spinWheel() {
            if (isSpinning) return;

            const betAmount = parseInt(document.getElementById('bet-amount').value);
            const betNumberInput = document.getElementById('bet-number').value;
            const betNumber = betNumberInput !== "" ? parseInt(betNumberInput) : null;

            if (isNaN(betAmount) || betAmount <= 0) return alert('Введите сумму ставки!');
            
            if (betAmount > playerBalance) {
                return alert('У тебя не хватает фишек на эту ставку, сосунок!');
            }

            if (selectedColor === null && betNumber === null) return alert('Выберите цвет или число!');

            isSpinning = true;
            document.getElementById('spin-button').disabled = true;

            playerBalance -= betAmount;
            document.getElementById('balance').innerText = playerBalance;

            const winningIndex = Math.floor(Math.random() * totalSectors);
            const winningNumber = rouletteNumbers[winningIndex];
            const winningColorHex = getNumberColor(winningNumber);
            let winningColor = winningColorHex === '#e74c3c' ? 'red' : winningColorHex === '#2c3e50' ? 'black' : 'green';

            const sectorAngleDeg = 360 / totalSectors;

            // 1. Вычисляем точный угол для конкретного сектора, чтобы он смотрел ровно вверх (на 12 часов = 270 градусов)
            const targetAngle = 270 - (winningIndex * sectorAngleDeg) - (sectorAngleDeg / 2);

            // 2. Узнаем, где сейчас находится колесо (остаток от деления на 360)
            const currentMod = currentWheelRotation % 360;
            let angleDiff = targetAngle - currentMod;

            // 3. Если разница отрицательная, корректируем, чтобы колесо всегда крутилось только вперед
            if (angleDiff < 0) {
                angleDiff += 360;
            }

            // 4. Прибавляем 5 полных зрелищных оборотов (360 * 5) и добавляем доводку до нужной ячейки
            currentWheelRotation += (360 * 5) + angleDiff; 

            // 5. Шарик просто крутится в обратную сторону на 5 оборотов и всегда паркуется ровно сверху
            currentBallRotation -= (360 * 5); 

            const wheel = document.getElementById('wheel-canvas');
            const ball = document.getElementById('ball');

            if (Telegram.WebApp.HapticFeedback) Telegram.WebApp.HapticFeedback.notificationOccurred('success');

            wheel.style.transform = `rotate(${currentWheelRotation}deg)`;
            ball.style.transform = `rotate(${currentBallRotation}deg)`;

            if (Telegram.WebApp.HapticFeedback) Telegram.WebApp.HapticFeedback.notificationOccurred('success');

            wheel.style.transform = `rotate(${targetWheelRotation}deg)`;
            ball.style.transform = `rotate(${targetBallRotation}deg)`;

            let tickInterval = setInterval(() => {
                if (Telegram.WebApp.HapticFeedback) Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }, 150);

            setTimeout(() => {
                clearInterval(tickInterval);
                if (Telegram.WebApp.HapticFeedback) Telegram.WebApp.HapticFeedback.impactOccurred('heavy');

                let winAmount = 0;
                if (betNumber !== null && betNumber === winningNumber) {
                    winAmount = betAmount * 35;
                } else if (selectedColor !== null && selectedColor === winningColor) {
                    winAmount = betAmount * 2;
                }

                const resultPayload = {
                    bet: betAmount,
                    win: winAmount,
                    num: winningNumber,
                    color: winningColor
                };

                Telegram.WebApp.sendData(JSON.stringify(resultPayload));

                // Разблокируем интерфейс для следующей игры
                isSpinning = false;
                document.getElementById('spin-button').disabled = false;
                
            }, 4000);
        }
    </script>
</body>
</html>
